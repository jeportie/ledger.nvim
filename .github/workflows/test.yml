name: test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        nvim: [stable, nightly]
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }}, ${{ matrix.nvim }})
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (${{ matrix.nvim }})
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}

      - name: Install plugin deps (plenary, volt)
        run: |
          mkdir -p ~/.local/share/nvim/lazy
          if [ ! -d ~/.local/share/nvim/lazy/plenary.nvim ]; then
            git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
              ~/.local/share/nvim/lazy/plenary.nvim
          fi
          if [ ! -d ~/.local/share/nvim/lazy/volt ]; then
            git clone --depth 1 https://github.com/nvzone/volt \
              ~/.local/share/nvim/lazy/volt
          fi

      - name: Run tests
        run: make test

  # Single aggregate context for branch protection. Succeeds only if every
  # matrix job did. `if: always()` so a failed/cancelled matrix still reports.
  ci:
    name: ci
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test matrix result: ${{ needs.test.result }}"
            exit 1
          fi
          echo "all matrix jobs passed"
